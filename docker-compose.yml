services:
  php:
    build: .
    image: magento-railway-php
    container_name: magento-railway-php
    depends_on:
      - db
      - opensearch
      - redis
    volumes:
      - ./:/var/www/html:cached
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - MAGENTO_BASE_URL=${MAGENTO_BASE_URL:-http://localhost:8080/}
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-magento}
      - DB_USER=${DB_USER:-magento}
      - DB_PASSWORD=${DB_PASSWORD:-magento}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT:-9200}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    ports:
      - 9000:9000

  nginx:
    image: nginx:1.25-alpine
    container_name: magento-railway-nginx
    depends_on:
      - php
    ports:
      - 8080:80
    volumes:
      - ./:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: mariadb:10.6
    container_name: magento-railway-db
    command:
      --max_allowed_packet=64M
      --optimizer_use_condition_selectivity=1
      --optimizer_switch="rowid_filter=off"
      --log_bin_trust_function_creators=1
    ports:
      - "3306:3306"
    environment:
      MYSQL_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-magento}
      MYSQL_DATABASE: ${DB_NAME:-magento}
      MYSQL_USER: ${DB_USER:-magento}
      MYSQL_PASSWORD: ${DB_PASSWORD:-magento}
      MYSQL_INTEGRATION_HOST: db
      MYSQL_INTEGRATION_DATABASE: ${DB_INTEGRATION_NAME:-magento_integration}
      MYSQL_INTEGRATION_USER: ${DB_USER:-magento}
      MYSQL_INTEGRATION_PASSWORD: ${DB_PASSWORD:-magento}
    volumes:
      - dbdata:/var/lib/mysql

  redis:
    image: valkey/valkey:8.1-alpine
    container_name: magento-railway-redis
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.10.0
    container_name: magento-railway-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - 9200:9200
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - os_data:/usr/share/opensearch/data

volumes:
  dbdata:
  os_data:
