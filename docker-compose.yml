version: "3.9"

services:
  php:
    build: .
    image: magento-railway-php
    container_name: magento-railway-php
    depends_on:
      - db
      - elasticsearch
      - redis
    volumes:
      - ./:/var/www/html:cached
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - MAGENTO_BASE_URL=${MAGENTO_BASE_URL:-http://localhost:8080/}
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-magento}
      - DB_USER=${DB_USER:-magento}
      - DB_PASSWORD=${DB_PASSWORD:-magento}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST:-elasticsearch}
      - ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT:-9200}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    ports:
      - 9000:9000

  nginx:
    image: nginx:1.25-alpine
    container_name: magento-railway-nginx
    depends_on:
      - php
    ports:
      - 8080:80
    volumes:
      - ./:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: mysql:8.0
    container_name: magento-railway-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-magento}
      MYSQL_DATABASE: ${DB_NAME:-magento}
      MYSQL_USER: ${DB_USER:-magento}
      MYSQL_PASSWORD: ${DB_PASSWORD:-magento}
    ports:
      - 3306:3306
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: magento-railway-redis
    ports:
      - 6379:6379

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.16
    container_name: magento-railway-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - 9200:9200
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  db_data:
  es_data:
